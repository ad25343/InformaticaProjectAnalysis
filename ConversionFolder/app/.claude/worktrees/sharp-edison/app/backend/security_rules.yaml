rules:
- id: rule_creds_001
  severity: CRITICAL
  category: credentials
  description: Never hardcode passwords, API keys, tokens, or secrets in generated
    code.
  guidance: Use os.environ.get('SECRET_NAME') or a secrets-manager client. Never assign
    literals like password='abc123' or api_key='sk-...'.
  enabled: true
- id: rule_sql_001
  severity: HIGH
  category: injection
  description: Never construct SQL queries by string concatenation or f-strings with
    user/external data.
  guidance: 'Use parameterised queries: cursor.execute(''SELECT * FROM t WHERE id
    = ?'', (val,)). For SQLAlchemy use ORM or text() with bindparams.'
  enabled: true
- id: rule_exec_001
  severity: HIGH
  category: code-execution
  description: Avoid eval(), exec(), and compile() on dynamic or external input.
  guidance: If dynamic evaluation is genuinely required, use ast.literal_eval() for
    safe literal expressions only.
  enabled: true
- id: rule_subprocess_001
  severity: HIGH
  category: injection
  description: Never pass unsanitised external data to subprocess, os.system, or shell=True.
  guidance: Use subprocess.run([...], shell=False) with a fixed command list. Validate
    and whitelist any user-supplied arguments before passing them.
  enabled: true
- id: rule_xml_001
  severity: HIGH
  category: xxe
  description: Disable DTD loading and external entity resolution when parsing XML.
  guidance: Use defusedxml.ElementTree or configure lxml with resolve_entities=False,
    no_network=True, forbid_dtd=True.
  enabled: true
- id: rule_zip_001
  severity: HIGH
  category: path-traversal
  description: Validate ZIP entry paths before extraction to prevent Zip Slip attacks.
  guidance: Resolve each entry to an absolute path and confirm it starts with the
    intended extraction directory. Reject entries containing '..' or absolute paths.
  enabled: true
- id: rule_assert_001
  severity: MEDIUM
  category: logic
  description: Do not use assert statements as security or input-validation guards.
  guidance: 'assert is stripped by Python''s -O optimisation flag. Replace with explicit
    if/raise: if not condition: raise ValueError(''...'')'
  enabled: true
- id: rule_hash_001
  severity: MEDIUM
  category: cryptography
  description: Do not use MD5 or SHA-1 for security-sensitive hashing (passwords,
    tokens, signatures).
  guidance: Use hashlib.sha256() or higher for general hashing. For passwords use
    bcrypt, scrypt, or argon2 via a dedicated library.
  enabled: true
- id: rule_random_001
  severity: MEDIUM
  category: cryptography
  description: Do not use the random module for security-sensitive values (tokens,
    session IDs, salts).
  guidance: Use secrets.token_hex(), secrets.token_urlsafe(), or os.urandom() for
    cryptographically secure random values.
  enabled: true
- id: rule_logging_001
  severity: MEDIUM
  category: data-exposure
  description: 'Never log sensitive values: passwords, tokens, PII, or connection
    strings.'
  guidance: Mask or omit sensitive fields before logging. Use a log filter or structured
    logging with explicit field exclusions.
  enabled: true
- id: rule_tls_001
  severity: MEDIUM
  category: transport
  description: Do not disable TLS/SSL certificate verification.
  guidance: Never set verify=False in requests or ssl_context.check_hostname=False.
    Use proper CA bundles for internal certificates instead.
  enabled: true
- id: rule_tempfile_001
  severity: LOW
  category: file-handling
  description: Use tempfile.NamedTemporaryFile or tempfile.mkstemp for temporary files;
    never predictable paths.
  guidance: Predictable /tmp/myapp_temp.txt paths are vulnerable to symlink and race-condition
    attacks. The tempfile module creates files with random names and correct permissions
    automatically.
  enabled: true
- id: rule_dbt_yaml_secret_001
  severity: HIGH
  category: credentials
  description: dbt profiles.yml must never contain plaintext secrets — use env_var()
    exclusively for all passwords, tokens, and connection strings.
  guidance: 'Every credential field in profiles.yml must use the env_var() macro:
    password: ''{{ env_var(''''DBT_PASSWORD'''') }}''. Never assign a literal string
    value. The YAML scanner will flag any ''password'', ''token'', or ''secret'' key
    whose value is not an env_var() call.'
  enabled: true
- id: rule_dbt_sql_injection_001
  severity: HIGH
  category: injection
  description: dbt post-hook and pre-hook SQL must never interpolate dbt ref(), source(),
    or Jinja variables directly into WHERE clauses or string concatenation.
  guidance: Use parametrised macros or dbt's run_query() with explicit quoting. Avoid
    patterns like 'WHERE table_name = {{ ref(''my_model'') }}' — use 'WHERE table_name
    = ''{{ ref(''my_model'') | string }}''' with proper escaping, or restructure to
    avoid dynamic identifiers in DML hooks entirely.
  enabled: true
- id: rule_dbt_env_var_validation_001
  severity: HIGH
  category: credentials
  description: All env_var() calls for database names, schemas, accounts, or credentials
    must have no default value — a missing variable must fail loudly, not silently
    use a fallback.
  guidance: Use env_var('VAR_NAME') without a default for any security-sensitive variable
    (passwords, account names, database names). Only use env_var('VAR', 'default')
    for truly optional non-sensitive config. This prevents silent misconfiguration
    in production deployments.
  enabled: true
- id: rule_dbt_jinja_code_execution_001
  severity: MEDIUM
  category: code-execution
  description: Do not use Python module calls (modules.datetime, modules.uuid, etc.)
    in dbt Jinja variable defaults or config blocks.
  guidance: Jinja var defaults are evaluated at parse time and can produce unexpected
    behaviour. Use dbt macros or run_started_at for timestamps. For UUIDs, use dbt_utils.generate_surrogate_key()
    or pass the value in via env_var().
  enabled: true
- id: rule_dbt_truncation_guard_001
  severity: LOW
  category: data-integrity
  description: Generated dbt SQL models must be complete — never end with a partial
    CASE statement, incomplete CTE, or truncated expression.
  guidance: Always verify that every CASE statement has a matching END, every CTE
    is closed with a final SELECT, and no SQL block is left open. Truncated output
    causes silent data loss or pipeline failures at runtime.
  enabled: true
- id: rule_oracle_tls_001
  severity: HIGH
  category: transport
  description: Oracle database connections in dbt profiles.yml must use TCPS (TLS-encrypted)
    protocol — never plain TCP.
  guidance: 'In profiles.yml, set ''protocol: tcps'' and provide a valid ''ssl_server_dn_match''
    or ''ssl_server_cert_dn'' entry. Plain TCP connections transmit credentials and
    query results unencrypted. Example: ''host: myhost.example.com'', ''port: 2484'',
    ''protocol: tcps''. Never use port 1521 with plain ''protocol: tcp'' for production
    Oracle connections.'
  enabled: true
- id: rule_log_injection_001
  severity: HIGH
  category: injection
  description: Never interpolate unsanitised external or user-supplied values directly
    into log messages or error strings — this enables log injection attacks.
  guidance: 'Sanitise values before including them in log output: strip newlines and
    carriage returns (value.replace(''\n'',''\\n'').replace(''\r'',''\\r'')), or use
    structured logging fields instead of string interpolation. In dbt macros, use
    ''{{ log(''''message: '''' ~ var_name | replace("\n"," "), info=true) }}'' rather
    than raw variable concatenation. Never log raw business input values, rate parameters,
    or tax codes without sanitisation.'
  enabled: true
- id: rule_macro_sql_injection_001
  severity: HIGH
  category: injection
  description: dbt macro parameters must be validated and quoted before use in SQL
    — passing macro arguments directly into SQL strings enables SQL injection.
  guidance: 'In dbt macros, always apply adapter.dispatch quoting or explicit quoting
    to any parameter used in a SQL context: ''{{ adapter.quote(table_name) }}'' for
    identifiers, ''{{ dbt_utils.safe_add(...) }}'' for expressions. Never interpolate
    a macro argument directly into a SQL string: avoid ''SELECT * FROM {{ table_name
    }}'' in favour of ''SELECT * FROM {{ adapter.quote(table_name) }}''.'
  enabled: true
- id: rule_hardcoded_business_constant_001
  severity: MEDIUM
  category: maintainability
  description: Business logic constants (tax rates, thresholds, fee percentages, status
    codes, SLA days) must not be hardcoded inline — they belong in dbt vars, a config
    model, or an environment variable.
  guidance: In dbt, use '{{ var(''tax_rate'', 0.085) }}' defined in dbt_project.yml
    vars block, or a dedicated seed/config model. In PySpark/Python, place constants
    in the CONFIG dict at the top of the file. Inline magic numbers make regulatory
    changes (e.g. a tax rate update) require code deploys rather than config updates,
    and they are invisible in audit trails.
  enabled: true
- id: rule_auto_plaintext_secret_in_yaml
  severity: HIGH
  category: yaml_scan
  description: '[Auto-promoted from 5× scan finding] Line 12 of ''profiles.yml'':
    key ''password'' appears to contain a plaintext secret (''{{ env_v…''). Use environment
    variables or a secrets manager instead.'
  guidance: 'Move this credential out of the YAML file. Reference it via an environment
    variable (e.g. `password: {{ env_var(''DB_PASSWORD'') }}`), a secrets manager
    (AWS Secrets Manager, HashiCorp Vault, Azure Key Vault), or a CI/CD secret (GitHub
    Actions secrets, Kubernetes Secrets). Never commit credentials to version control.'
  enabled: true
